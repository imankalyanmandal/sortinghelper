# ── Production application.properties ─────────────────────────────────────────
# These override application.properties when SPRING_PROFILES_ACTIVE=prod

# Python service URL — uses Docker service name, not localhost
market.data.service.url=http://python-service:5000

# SQLite — file stored in Docker volume
spring.datasource.url=jdbc:sqlite:/data/signal_engine.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Logging — reduce noise in production
logging.level.root=WARN
logging.level.signal_engine=INFO

# Disable dev tools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Increase timeout for long pipeline runs
spring.mvc.async.request-timeout=300000
server.servlet.session.timeout=30m

# Reduce parallel threads to avoid Yahoo Finance rate limiting
live.scan.thread.count=3
