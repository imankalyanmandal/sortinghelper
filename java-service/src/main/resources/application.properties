# SQLite database — single file, no server needed
spring.datasource.url=jdbc:sqlite:trades.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Enable @Scheduled (price refresh job)
spring.task.scheduling.enabled=true

# Allow CORS from the tracker UI served on any port
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PATCH,DELETE,OPTIONS

# ── Live scan thresholds ──────────────────────────────────────────────────────
live.scan.data.period=3mo

# Gate 1 — SMA50 slope lookback
live.scan.sma50.slope.bars=10

# Gate 2 — ATR bounds (stock must be in motion, not a wild swing)
live.scan.atr.pct.min=1.0
live.scan.atr.pct.max=6.0

# Gate 3 — Price structure lookback bars
live.scan.structure.lookback.bars=20

# Gate 4 — Max risk % (stop to entry distance)
live.scan.stop.max.pct=4.0

# Setup detection
live.scan.pullback.band=0.02
live.scan.resistance.pct=5.0

# RSI zones — pullback vs breakout have different valid ranges
live.scan.pullback.rsi.low=35
live.scan.pullback.rsi.high=50
live.scan.breakout.rsi.low=55
live.scan.breakout.rsi.high=65

# Volume minimums — breakout needs stronger confirmation
live.scan.volume.pullback.min=1.5
live.scan.volume.breakout.min=2.0

# Stop/target
live.scan.atr.multiplier=2.0
live.scan.rr.ratio=2.0

# Minimum score to qualify as a valid setup
live.scan.setup.min.score=50

# Relative strength lookback
live.scan.rs.lookback.bars=20

# ── Layer 3 — S/R refinement ───────────────────────────────────────────────────
layer3.data.period=6mo
layer3.pivot.bars=3
layer3.sr.lookback=60
layer3.cluster.tolerance=0.015
layer3.stop.atr.multiplier=2.0
layer3.stop.buffer.atr=0.5
layer3.stop.max.pct=7.0
layer3.stop.min.atr=1.0
layer3.target.atr.multiplier=4.0
layer3.min.rr.ratio=1.5

# ── Strategy signal thresholds ────────────────────────────────────────────────
strategy.rsi.oversold=30
strategy.rsi.overbought=70
strategy.volume.buy.multiplier=1.5
strategy.volume.sell.multiplier=1.0
strategy.bb.squeeze.threshold=0.05
strategy.bb.squeeze.bars=5
strategy.atr.rising.bars=3

# ── Market regime detection ───────────────────────────────────────────────────
regime.bear.drawdown.pct=10.0
regime.bear.rsi.max=45.0
regime.sideways.sma200.band=0.03
regime.volatile.atr.multiplier=1.5
regime.bull.rsi.min=45.0

# Parallel scan thread count (10 = 10x faster than sequential)
live.scan.thread.count=10