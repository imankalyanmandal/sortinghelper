version: "3.9"

services:

  # ── Python market data service ─────────────────────────────────────────────
  python-service:
    build:
      context: ./python-service
    container_name: signal-python
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./python-service/.env
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Java Spring Boot service ───────────────────────────────────────────────
  java-service:
    build:
      context: ./java-service
    container_name: signal-java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MARKET_DATA_SERVICE_URL=http://python-service:5000
      # SQLite DB stored in a volume so data persists across restarts
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/data/signal_engine.db
    volumes:
      - signal-db:/data
    depends_on:
      python-service:
        condition: service_started

  # ── Trade tracker UI (nginx serves the HTML) ───────────────────────────────
  ui:
    image: nginx:alpine
    container_name: signal-ui
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./trade_tracker.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  signal-db:
    driver: local